server:
  port: 9000

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Methods Access-Control-Allow-Headers, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            expose-headers: "*"
            max-age: 3600
      routes:
        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:9001}
          predicates:
            - Path=/api/auth/**

        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://localhost:9001}
          predicates:
            - Path=/api/users/**

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:9002}
          predicates:
            - Path=/api/products/**

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:9003}
          predicates:
            - Path=/api/orders/**

        - id: cart-service
          uri: ${ORDER_SERVICE_URL:http://localhost:9003}
          predicates:
            - Path=/api/cart/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:9004}
          predicates:
            - Path=/api/payments/**

        - id: ai-service
          uri: ${AI_ORCHESTRATOR_URL:http://localhost:8000}
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
