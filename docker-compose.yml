services:
  elasticsearch:
    image: elasticsearch:8.17.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - esdata:/var/lib/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - torome-net

  postgres-user:
    extends:
      file: infra/docker/docker-compose.db.yml
      service: postgres-user
    networks:
      - torome-net

  postgres-product:
    extends:
      file: infra/docker/docker-compose.db.yml
      service: postgres-product
    networks:
      - torome-net

  postgres-order:
    extends:
      file: infra/docker/docker-compose.db.yml
      service: postgres-order
    networks:
      - torome-net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "9001:9001"
    environment:
      DB_URL: jdbc:postgresql://postgres-user:5432/torome_user
      DB_USERNAME: torome
      DB_PASSWORD: torome_secret_2024
      JWT_SECRET: ${JWT_SECRET:-torome-store-jwt-secret-key-for-development-only-change-in-production-min-256-bits!!}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres-user:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - torome-net

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    ports:
      - "9002:9002"
    environment:
      DB_URL: jdbc:postgresql://postgres-product:5432/torome_product
      DB_USERNAME: torome
      DB_PASSWORD: torome_secret_2024
      ELASTICSEARCH_URI: http://elasticsearch:9200
      JWT_SECRET: ${JWT_SECRET:-torome-store-jwt-secret-key-for-development-only-change-in-production-min-256-bits!!}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres-product:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - torome-net

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "9003:9003"
    environment:
      DB_URL: jdbc:postgresql://postgres-order:5432/torome_order
      DB_USERNAME: torome
      DB_PASSWORD: torome_secret_2024
      PRODUCT_SERVICE_URL: http://product-service:9002
      USER_SERVICE_URL: http://user-service:9001
      JWT_SECRET: ${JWT_SECRET:-torome-store-jwt-secret-key-for-development-only-change-in-production-min-256-bits!!}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres-order:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - torome-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "9004:9004"
    environment:
      ORDER_SERVICE_URL: http://order-service:9003
      JWT_SECRET: ${JWT_SECRET:-torome-store-jwt-secret-key-for-development-only-change-in-production-min-256-bits!!}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - torome-net

  gateway:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    ports:
      - "9000:9000"
    environment:
      USER_SERVICE_URL: http://user-service:9001
      PRODUCT_SERVICE_URL: http://product-service:9002
      ORDER_SERVICE_URL: http://order-service:9003
      PAYMENT_SERVICE_URL: http://payment-service:9004
      AI_ORCHESTRATOR_URL: ${AI_ORCHESTRATOR_URL:-http://host.docker.internal:8000}
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - torome-net

volumes:
  esdata:
  torome-pgdata-user:
  torome-pgdata-product:
  torome-pgdata-order:

networks:
  torome-net:
    name: torome-net
