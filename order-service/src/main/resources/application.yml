server:
  port: 9003

spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/torome_store}
    username: ${DB_USERNAME:torome}
    password: ${DB_PASSWORD:torome123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: false

app:
  jwt:
    secret: ${JWT_SECRET:torome-store-jwt-secret-key-for-development-only-change-in-production-min-256-bits!!}
    expiration-ms: 86400000

services:
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:9002}

logging:
  level:
    com.torome.store: DEBUG
