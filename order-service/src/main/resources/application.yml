server:
  port: 9003

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://postgres-order:5432/torome_order
    username: ${DB_USERNAME:torome}
    password: ${DB_PASSWORD:torome_secret_2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: Initial baseline from existing ddl-auto schema
    validate-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:torome-store-jwt-secret-key-for-development-only-change-in-production-min-256-bits!!}
    expiration-ms: 86400000

services:
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:9002}
  user:
    url: ${USER_SERVICE_URL:http://localhost:9001}

logging:
  level:
    com.torome.store: DEBUG
