server:
  port: 9000

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/torome_store}
    username: ${DB_USERNAME:torome}
    password: ${DB_PASSWORD:torome123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

app:
  jwt:
    secret: ${JWT_SECRET:torome-store-jwt-secret-key-for-development-only-change-in-production-min-256-bits!!}
    expiration-ms: 86400000
  ai:
    orchestrator-url: ${AI_ORCHESTRATOR_URL:http://localhost:8000}

logging:
  level:
    com.torome.store: DEBUG
    org.springframework.security: DEBUG
