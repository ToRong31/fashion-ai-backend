server:
  port: 9002

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://postgres-product:5432/torome_product
    username: ${DB_USERNAME:torome}
    password: ${DB_PASSWORD:torome_secret_2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

app:
  jwt:
    secret: ${JWT_SECRET:torome-store-jwt-secret-key-for-development-only-change-in-production-min-256-bits!!}
    expiration-ms: 86400000

logging:
  level:
    com.torome.store: DEBUG
